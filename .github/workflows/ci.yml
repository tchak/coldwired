name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browsers
        run: vp dlx playwright install --with-deps

      - name: Check
        run: vp check

      - name: Test
        run: vp test

      - name: Build
        run: vp run build
